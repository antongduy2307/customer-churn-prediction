name: CICD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  REGISTRY: ghcr.io
  REF_REPO: antongduy/customer-churn-prediction
  DOCKER_BUILDKIT: 1

jobs:
  feast:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Apply Feast Feature Definitions
        working-directory: /home/antongduy/customer-churn-prediction/data-pipeline/churn_feature_store/churn_features/feature_repo
        run: |
          conda run -n churn_mlops_v2 feast apply
      - name: Materialize Feast Features
        working-directory: /home/antongduy/customer-churn-prediction/data-pipeline/churn_feature_store/churn_features/feature_repo
        run: |
          conda run -n churn_mlops_v2 feast materialize-incremental $(date -u +"%Y-%m-%dT%H:%M:%S")

  training:
    runs-on: [self-hosted, linux]
    needs: feast        # ← only runs if feast succeeds
    steps:
      - uses: actions/checkout@v4

      - name: Run Training
        working-directory: ./model_pipeline
        run: |
          conda run -n churn_mlops_v2 bash ./src/run_sh/train.sh | tee train.log
          RUN_ID=$(grep -oE 'runs/[a-f0-9]+' train.log | head -n1 | cut -d/ -f2)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Run Evaluation
        working-directory: ./model_pipeline
        run: |
          conda run -n churn_mlops_v2 bash ./src/run_sh/eval.sh --run-id ${{ env.RUN_ID }}

      - name: Register Model
        working-directory: ./model_pipeline
        run: |
          conda run -n churn_mlops_v2 bash ./src/run_sh/register.sh --run-id ${{ env.RUN_ID }}

      - name: Promote to Champion
        working-directory: ./model_pipeline
        run: |
          conda run -n churn_mlops_v2 bash ./src/run_sh/promote.sh

  serving:
    runs-on: [self-hosted, linux]
    needs: training     # ← only runs if training succeeds
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REF_REPO }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./serving_pipeline
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REF_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REF_REPO }}:buildcache,mode=max

      - name: Deploy
        working-directory: ./serving_pipeline
        run: |
          docker compose up -d --force-recreate
